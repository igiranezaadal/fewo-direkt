<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FeWo-direkt Clone</title>
<link rel="stylesheet" href="fewo-direkt.css">
</head>
<body>

<header>
  <div class="logo">FeWo-direkt</div>

  <nav>
    <a href="#">Open app</a>
    <a href="#">Trip planner</a>
    <a href="#">Register accommodation</a>
    <a href="#">Help</a>
    <a href="#">My Trips</a>
    <a href="#">Sign in</a>
  </nav>
</header>


<section class="hero">

  <div class="hero-text">
    The entire accommodation just for you
  </div>

  <div class="search-box">

    <div class="search-item">
      <span>📍</span>
      <input type="text" placeholder="Where to go?">
    </div>

    <div class="search-item">
      <span>📅</span>

      <div class="date-range">
        <input type="date" name="checkin">
        <span class="dash">-</span>
        <input type="date" name="checkout">
      </div>

    </div>

    <div class="search-item">
      <span>👤</span>
      <input type="text" value="2 Gäste">
    </div>

    <button class="search-btn">Search</button>

  </div>

</section>


<section class="signin-banner">

  <div class="banner-text">
    Sign in to send the host a message and get more details about a place to stay
  </div>

  <button class="signin-btn">Sign in</button>

</section>

</body>
</html>
